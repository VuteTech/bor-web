<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="none"/>

  <!-- Server box -->
  <rect x="320" y="80" width="200" height="120" rx="12" fill="#f0f7f1" stroke="#2E7D32" stroke-width="2"/>
  <text x="420" y="120" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="16" font-weight="600" fill="#0F2F24">Server</text>
  <text x="420" y="145" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="12" fill="#6a6e73">Web UI + gRPC API</text>
  <text x="420" y="165" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="12" fill="#6a6e73">Policy Management</text>
  <text x="420" y="185" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="12" fill="#6a6e73">RBAC &amp; PKI</text>

  <!-- Database box -->
  <rect x="350" y="260" width="140" height="70" rx="12" fill="#f5f5f5" stroke="#d2d2d2" stroke-width="2"/>
  <text x="420" y="295" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="14" font-weight="600" fill="#444F60">PostgreSQL</text>
  <text x="420" y="315" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="11" fill="#6a6e73">Policies &amp; Nodes</text>

  <!-- Server to DB line -->
  <line x1="420" y1="200" x2="420" y2="260" stroke="#d2d2d2" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Agent boxes -->
  <rect x="60" y="60" width="160" height="80" rx="12" fill="#f0f7f1" stroke="#4CAF50" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="14" font-weight="600" fill="#0F2F24">Agent</text>
  <text x="140" y="115" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="11" fill="#6a6e73">Desktop 1</text>

  <rect x="60" y="170" width="160" height="80" rx="12" fill="#f0f7f1" stroke="#4CAF50" stroke-width="2"/>
  <text x="140" y="205" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="14" font-weight="600" fill="#0F2F24">Agent</text>
  <text x="140" y="225" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="11" fill="#6a6e73">Desktop 2</text>

  <rect x="60" y="280" width="160" height="80" rx="12" fill="#f0f7f1" stroke="#4CAF50" stroke-width="2"/>
  <text x="140" y="315" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="14" font-weight="600" fill="#0F2F24">Agent</text>
  <text x="140" y="335" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="11" fill="#6a6e73">Desktop N</text>

  <!-- Connection lines (agents to server) -->
  <line x1="220" y1="100" x2="320" y2="120" stroke="#2E7D32" stroke-width="2"/>
  <line x1="220" y1="210" x2="320" y2="150" stroke="#2E7D32" stroke-width="2"/>
  <line x1="220" y1="320" x2="320" y2="170" stroke="#2E7D32" stroke-width="2"/>

  <!-- Protocol label -->
  <text x="270" y="108" text-anchor="middle" font-family="'Open Sans', sans-serif" font-size="10" fill="#2E7D32" transform="rotate(-6, 270, 108)">gRPC/mTLS</text>

  <!-- Arrow heads -->
  <polygon points="316,121 322,117 318,126" fill="#2E7D32"/>
  <polygon points="316,151 322,148 318,156" fill="#2E7D32"/>
  <polygon points="316,171 322,168 318,176" fill="#2E7D32"/>
</svg>
